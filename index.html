<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Form</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        
        <div class="text">
            <h1>facebook</h1><br>
            <p>Facebook helps you connect and share with the people in your lifek</p>
        </div>
        
        <div class="form">
            <form action="">
               <div class="fieldset">
                <input type="text" id="Email"  placeholder="Email or Phone Number" required><br><br>
                <input type="password" id="password" placeholder="Password" required><br><br>
                <button id="Login">Login</button>
                <p>Forget Password?</p>
                <hr>
                <button id="signup"><a > Create New Account</a> </button>
               </div>
            </form>
        </div>
        
    </div>
</body>
</html>
